<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Gestione Auto</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%9A%97%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0f1115; --card:#181b22; --card2:#1f2330; --line:#2a2f3a;
  --txt:#e8eaed; --muted:#9aa0ab; --accent:#3b82f6; --accent2:#22c55e;
  --danger:#ef4444; --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg); color:var(--txt);
  font:16px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  padding:14px; padding-bottom:40px; max-width:680px; margin:0 auto;
  -webkit-text-size-adjust:100%;
}
h1{font-size:20px;margin:4px 0 14px;display:flex;align-items:center;gap:8px}
h2{font-size:15px;margin:0 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px}
label{display:block;font-size:13px;color:var(--muted);margin:0 0 4px}
input{
  width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);
  border-radius:10px;padding:12px;font-size:16px;
}
input:focus{outline:none;border-color:var(--accent)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row1{margin-bottom:10px}
.date-row{display:flex;gap:8px}
.today{width:auto;flex:0 0 auto;background:var(--card2);color:var(--txt);border:1px solid var(--line);padding:0 18px;font-weight:600}
.hint{font-size:12px;color:var(--muted);margin-top:6px;min-height:16px}
button{
  font:inherit;font-weight:600;border:none;border-radius:10px;padding:13px;
  width:100%;cursor:pointer;color:#fff;background:var(--accent);
}
button:active{transform:translateY(1px)}
.btn-row{display:flex;gap:10px;margin-top:12px}
.btn-row button{flex:1}
.ghost{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
/* riepilogo */
.sum{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:10px;overflow:hidden}
.sum>div{background:var(--card);padding:11px 12px}
.sum .k{font-size:12px;color:var(--muted)}
.sum .v{font-size:18px;font-weight:700;margin-top:2px}
.sum .v small{font-size:12px;font-weight:500;color:var(--muted)}
.full{grid-column:1/-1}
/* list */
.item{border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:9px;background:var(--card2)}
.item .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.item .st{font-weight:700}
.item .dt{font-size:12px;color:var(--muted)}
.item .meta{font-size:13px;color:var(--muted);margin-top:5px;display:flex;flex-wrap:wrap;gap:10px}
.item .meta b{color:var(--txt);font-weight:600}
.item .x{color:var(--danger);background:none;border:none;width:auto;padding:4px 6px;font-size:18px;line-height:1;flex:0 0 auto}
.item .ed{color:var(--accent);background:none;border:none;width:auto;padding:4px 6px;font-size:16px;line-height:1;flex:0 0 auto}
.cons-good{color:var(--accent2)}
.cons-bad{color:var(--danger)}
.empty{color:var(--muted);text-align:center;padding:20px}
.nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.nav button{background:var(--card2);color:var(--muted);border:1px solid var(--line);flex:1 1 auto;padding:11px 8px;font-size:14px}
.nav button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.bar{display:flex;justify-content:space-between;align-items:center;padding:11px 12px;background:var(--card2);border:1px solid var(--line);border-radius:10px;margin-bottom:10px}
.bar b{font-size:18px}
.bar small{color:var(--muted);font-weight:500}
.desc{font-weight:700}
.note{font-size:13px;color:var(--muted);margin-top:5px}
.item.done .desc{text-decoration:line-through;opacity:.55}
.chk{flex:0 0 auto;width:auto;background:var(--card);border:1px solid var(--line);color:var(--accent2);font-size:18px;padding:5px 11px;line-height:1}
</style>
</head>
<body>
<h1>🚗 Gestione Auto</h1>

<div class="nav">
  <button id="nav-benzina" class="on" onclick="showSec('benzina')">⛽ Benzina</button>
  <button id="nav-manut" onclick="showSec('manut')">🔧 Manutenzione</button>
  <button id="nav-prob" onclick="showSec('prob')">⚠️ Problemi</button>
  <button id="nav-ric" onclick="showSec('ric')">🔩 Ricambi</button>
  <button id="nav-spese" onclick="showSec('spese')">💶 Spese</button>
</div>

<!-- BENZINA -->
<section id="sec-benzina">
  <div class="card">
    <h2>Nuovo rifornimento</h2>
    <div class="row1">
      <label>Data — opzionale</label>
      <div class="date-row">
        <input type="date" id="f-date">
        <button type="button" class="today" onclick="setToday('f-date')">Oggi</button>
      </div>
    </div>
    <div class="row1">
      <label>Distributore</label>
      <input id="f-station" list="stations" placeholder="es. Q8, ELLEBI…" autocomplete="off">
      <datalist id="stations"></datalist>
    </div>
    <div class="grid">
      <div>
        <label>Importo (€)</label>
        <input type="number" id="f-imp" inputmode="decimal" step="0.01" placeholder="50">
      </div>
      <div>
        <label>Prezzo (€/L)</label>
        <input type="number" id="f-prz" inputmode="decimal" step="0.001" placeholder="1.799">
      </div>
    </div>
    <div class="row1" style="margin-top:10px">
      <label>Contachilometri (km totali) — opzionale</label>
      <input type="number" id="f-odo" inputmode="numeric" step="1" placeholder="es. 164991">
    </div>
    <div class="hint" id="hint"></div>
    <div class="btn-row">
      <button id="f-save" onclick="addEntry()">Aggiungi rifornimento</button>
      <button class="ghost" id="f-cancel" onclick="cancelFuel()" hidden>Annulla</button>
    </div>
  </div>
  <div class="card">
    <h2>Riepilogo benzina</h2>
    <div class="sum" id="sum"></div>
  </div>
  <div class="card">
    <h2>Storico rifornimenti</h2>
    <div id="list"></div>
  </div>
</section>

<!-- MANUTENZIONE -->
<section id="sec-manut" hidden>
  <div class="card">
    <h2>Nuova manutenzione</h2>
    <div class="row1">
      <label>Data — opzionale</label>
      <div class="date-row">
        <input type="date" id="m-date">
        <button type="button" class="today" onclick="setToday('m-date')">Oggi</button>
      </div>
    </div>
    <div class="row1">
      <label>Descrizione</label>
      <input id="m-desc" placeholder="es. Cambio olio + filtri">
    </div>
    <div class="grid">
      <div>
        <label>Prezzo (€)</label>
        <input type="number" id="m-prz" inputmode="decimal" step="0.01" placeholder="120">
      </div>
      <div>
        <label>Chilometraggio</label>
        <input type="number" id="m-km" inputmode="numeric" step="1" placeholder="165000">
      </div>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button id="m-save" onclick="addManut()">Aggiungi manutenzione</button>
      <button class="ghost" id="m-cancel" onclick="cancelM()" hidden>Annulla</button>
    </div>
  </div>
  <div class="card">
    <h2>Storico manutenzioni</h2>
    <div class="bar"><small>Totale speso</small><b id="m-tot">—</b></div>
    <div id="m-list"></div>
  </div>
</section>

<!-- PROBLEMI -->
<section id="sec-prob" hidden>
  <div class="card">
    <h2>Nuovo problema</h2>
    <div class="row1">
      <label>Descrizione</label>
      <input id="p-desc" placeholder="es. Rumore freni anteriori">
    </div>
    <div class="row1">
      <label>Nota — opzionale</label>
      <input id="p-note" placeholder="dettagli…">
    </div>
    <div class="btn-row">
      <button id="p-save" onclick="addProb()">Aggiungi problema</button>
      <button class="ghost" id="p-cancel" onclick="cancelP()" hidden>Annulla</button>
    </div>
  </div>
  <div class="card">
    <h2>Problemi</h2>
    <div class="bar"><small>Da risolvere / totali</small><b id="p-open">—</b></div>
    <div id="p-list"></div>
  </div>
</section>

<!-- RICAMBI -->
<section id="sec-ric" hidden>
  <div class="card">
    <h2>Nuovo pezzo</h2>
    <div class="row1">
      <label>Pezzo</label>
      <input id="r-nome" placeholder="es. Pastiglie freni anteriori">
    </div>
    <div class="grid">
      <div>
        <label>Prezzo (€)</label>
        <input type="number" id="r-prz" inputmode="decimal" step="0.01" placeholder="45">
      </div>
      <div>
        <label>Nota — opzionale</label>
        <input id="r-note" placeholder="codice / dove comprarlo">
      </div>
    </div>
    <div class="btn-row" style="margin-top:12px">
      <button id="r-save" onclick="addRic()">Aggiungi pezzo</button>
      <button class="ghost" id="r-cancel" onclick="cancelR()" hidden>Annulla</button>
    </div>
  </div>
  <div class="card">
    <h2>Pezzi di ricambio</h2>
    <div class="bar"><small>Totale</small><b id="r-tot">—</b></div>
    <div id="r-list"></div>
  </div>
</section>

<!-- SPESE -->
<section id="sec-spese" hidden>
  <div class="card">
    <h2>Riepilogo spese</h2>
    <div class="sum" id="spese"></div>
  </div>
  <div class="card">
    <h2>Backup di tutti i dati</h2>
    <div class="btn-row">
      <button class="ghost" onclick="exportData()">Esporta backup</button>
      <button class="ghost" onclick="document.getElementById('imp-file').click()">Importa backup</button>
    </div>
    <input type="file" id="imp-file" accept=".json" hidden onchange="importData(this)">
  </div>
</section>

];

let data;
data=load();

function load(){
  try{const s=localStorage.getItem(KEY); if(s) return JSON.parse(s);}catch(e){}
  const d=SEED.slice(); save(d); return d;
}
function save(d){ data=d||data; localStorage.setItem(KEY,JSON.stringify(data)); }

// altre sezioni (manutenzione / problemi / ricambi)
function ls(k,def){ try{const s=localStorage.getItem(k); if(s) return JSON.parse(s);}catch(e){} return def; }
function lsSave(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
let manut=ls("manut_v1",[]);
let problemi=ls("prob_v1",[]);
let ricambi=ls("ric_v1",[]);

// indice in modifica per ogni sezione (null = sto aggiungendo nuovo)
let editFuel=null, editManut=null, editProb=null, editRic=null;
const ADD_LABELS={"f-save":"Aggiungi rifornimento","m-save":"Aggiungi manutenzione","p-save":"Aggiungi problema","r-save":"Aggiungi pezzo"};
function editMode(saveId,cancelId,on){
  document.getElementById(saveId).textContent=on?"Salva modifiche":ADD_LABELS[saveId];
  document.getElementById(cancelId).hidden=!on;
}

const num=v=>(v===""||v==null||isNaN(+v))?null:+v;
const eur=n=>fmt(n,2," €");
function todayLocal(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);}
function setToday(id){document.getElementById(id).value=todayLocal();}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmt(n,dec,suf){ if(n==null||!isFinite(n)) return "—";
  return n.toLocaleString("it-IT",{minimumFractionDigits:dec,maximumFractionDigits:dec})+(suf||""); }
function dmy(iso){ if(!iso) return "—"; const[y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; }

// arricchisce ogni voce con litri / km percorsi / consumo (logica excel)
function compute(){
  const list=data.slice().sort((a,b)=>(a.date||"")<(b.date||"")?-1:1);
  let prev=null; // voce precedente (come excel: differenza solo con la riga subito sopra)
  for(const e of list){
    e.litri=(e.importo>0&&e.prezzo>0)?e.importo/e.prezzo:null;
    if(e.odo!=null&&prev&&prev.odo!=null) e.kmPerc=e.odo-prev.odo;
    else e.kmPerc=(e.kmp!=null)?e.kmp:null;
    e.consumo=(e.kmPerc!=null&&e.litri)?e.kmPerc/e.litri:null;
    prev=e;
  }
  return list;
}

function summary(list){
  const imp=list.filter(e=>e.importo>0);
  const count=imp.length;
  const spesa=imp.reduce((s,e)=>s+e.importo,0);
  const litri=list.reduce((s,e)=>s+(e.litri||0),0);
  const km=list.reduce((s,e)=>s+(e.kmPerc||0),0);
  const cons=list.map(e=>e.consumo).filter(c=>c!=null&&isFinite(c));
  const odos=list.map(e=>e.odo).filter(o=>o!=null);
  return {
    count, spesa, litri, km,
    consMedio: litri?km/litri:null,
    prezzoMedio: litri?spesa/litri:null,
    costoKm: km?spesa/km:null,
    spesaPieno: count?spesa/count:null,
    best: cons.length?Math.max(...cons):null,
    worst: cons.length?Math.min(...cons):null,
    ultimoOdo: odos.length?Math.max(...odos):null,
  };
}

function render(){
  const list=compute();
  // datalist distributori
  const sts=[...new Set(data.map(e=>e.station).filter(Boolean))].sort();
  document.getElementById("stations").innerHTML=sts.map(s=>`<option value="${s}">`).join("");

  // riepilogo
  const s=summary(list);
  document.getElementById("sum").innerHTML=`
    ${cell("Rifornimenti",s.count,"")}
    ${cell("Spesa totale",fmt(s.spesa,2," €"))}
    ${cell("Litri totali",fmt(s.litri,1," L"))}
    ${cell("Km percorsi",fmt(s.km,0," km"))}
    ${cell("Consumo medio",fmt(s.consMedio,2),"km/l")}
    ${cell("Prezzo medio",fmt(s.prezzoMedio,3),"€/l")}
    ${cell("Costo medio",fmt(s.costoKm,3),"€/km")}
    ${cell("Spesa media / pieno",fmt(s.spesaPieno,2," €"))}
    ${cell("Consumo migliore",fmt(s.best,2),"km/l")}
    ${cell("Consumo peggiore",fmt(s.worst,2),"km/l")}
    ${cell("Ultimo contachilometri",fmt(s.ultimoOdo,0," km"),"","full")}
  `;

  // storico (più recente in alto)
  const box=document.getElementById("list");
  if(!list.length){ box.innerHTML='<div class="empty">Nessun rifornimento.</div>'; return; }
  box.innerHTML=list.slice().reverse().map(e=>{
    const cc=e.consumo==null?"":(e.consumo>=s.consMedio?"cons-good":"cons-bad");
    return `<div class="item">
      <div class="top">
        <span class="st">${e.station||"—"}</span>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="dt">${dmy(e.date)}</span>
          <button class="ed" title="Modifica" onclick="editEntry(${data.indexOf(e)})">✎</button>
          <button class="x" title="Elimina" onclick="del(${data.indexOf(e)})">✕</button>
        </span>
      </div>
      <div class="meta">
        <span><b>${fmt(e.importo,2," €")}</b></span>
        <span>${fmt(e.prezzo,3," €/l")}</span>
        <span><b>${fmt(e.litri,2," L")}</b></span>
        <span>${e.kmPerc!=null?fmt(e.kmPerc,0," km"):"—"}</span>
        <span class="${cc}"><b>${e.consumo!=null?fmt(e.consumo,2," km/l"):"—"}</b></span>
      </div>
    </div>`;
  }).join("");
}
function cell(k,v,suf,extra){
  return `<div class="${extra||''}"><div class="k">${k}</div>
    <div class="v">${v}${suf?` <small>${suf}</small>`:""}</div></div>`;
}

// preview litri live
function updateHint(){
  const i=num(document.getElementById("f-imp").value), p=num(document.getElementById("f-prz").value);
  document.getElementById("hint").textContent=(i&&p)?`≈ ${fmt(i/p,2)} litri`:"";
}
["f-imp","f-prz"].forEach(id=>document.getElementById(id).addEventListener("input",updateHint));

function addEntry(){
  const e={
    date:document.getElementById("f-date").value||null,
    station:document.getElementById("f-station").value.trim(),
    importo:num(document.getElementById("f-imp").value),
    prezzo:num(document.getElementById("f-prz").value),
    odo:num(document.getElementById("f-odo").value),
  };
  if(!e.importo||!e.prezzo){ alert("Inserisci importo e prezzo."); return; }
  if(editFuel!=null){ data[editFuel]={...data[editFuel],...e}; }  // mantiene kmp originale
  else { e.kmp=null; data.push(e); }
  save(); cancelFuel(); renderAll();
}
function editEntry(i){
  const e=data[i];
  document.getElementById("f-date").value=e.date||"";
  document.getElementById("f-station").value=e.station||"";
  document.getElementById("f-imp").value=e.importo??"";
  document.getElementById("f-prz").value=e.prezzo??"";
  document.getElementById("f-odo").value=e.odo??"";
  editFuel=i; editMode("f-save","f-cancel",true); updateHint(); showSec("benzina");
}
function cancelFuel(){
  editFuel=null; editMode("f-save","f-cancel",false);
  ["f-date","f-station","f-imp","f-prz","f-odo"].forEach(id=>document.getElementById(id).value="");
  updateHint();
}

function del(i){
  if(!confirm("Eliminare questo rifornimento?")) return;
  if(i>=0&&i<data.length){ data.splice(i,1); save(); renderAll(); }
}

function exportData(){
  const all={version:2,fuel:data,manut,problemi,ricambi};
  const blob=new Blob([JSON.stringify(all,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="auto_backup_"+todayLocal()+".json";
  a.click();
}
function importData(inp){
  const f=inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const d=JSON.parse(r.result);
    if(!confirm("Sostituire i dati attuali con il backup?")) return;
    if(Array.isArray(d)){ data=d; }                 // vecchio formato (solo benzina)
    else {
      if(Array.isArray(d.fuel)) data=d.fuel;
      if(Array.isArray(d.manut)) manut=d.manut;
      if(Array.isArray(d.problemi)) problemi=d.problemi;
      if(Array.isArray(d.ricambi)) ricambi=d.ricambi;
    }
    save(); lsSave("manut_v1",manut); lsSave("prob_v1",problemi); lsSave("ric_v1",ricambi);
    renderAll(); alert("Importato.");
  }catch(e){ alert("File non valido."); } };
  r.readAsText(f);
}

// ---- Manutenzione ----
function addManut(){
  const e={date:document.getElementById("m-date").value||null,
    desc:document.getElementById("m-desc").value.trim(),
    prezzo:num(document.getElementById("m-prz").value),
    km:num(document.getElementById("m-km").value)};
  if(!e.desc||!e.prezzo){ alert("Inserisci descrizione e prezzo."); return; }
  if(editManut!=null){ manut[editManut]=e; } else { manut.push(e); }
  lsSave("manut_v1",manut); cancelM(); renderAll();
}
function editM(i){
  const e=manut[i];
  document.getElementById("m-date").value=e.date||"";
  document.getElementById("m-desc").value=e.desc||"";
  document.getElementById("m-prz").value=e.prezzo??"";
  document.getElementById("m-km").value=e.km??"";
  editManut=i; editMode("m-save","m-cancel",true); showSec("manut");
}
function cancelM(){
  editManut=null; editMode("m-save","m-cancel",false);
  ["m-date","m-desc","m-prz","m-km"].forEach(id=>document.getElementById(id).value="");
}
function delManut(i){ if(confirm("Eliminare questa manutenzione?")){ manut.splice(i,1); lsSave("manut_v1",manut); renderAll(); } }
function renderManut(){
  document.getElementById("m-tot").textContent=eur(manut.reduce((s,e)=>s+(e.prezzo||0),0));
  const box=document.getElementById("m-list");
  if(!manut.length){ box.innerHTML='<div class="empty">Nessuna manutenzione.</div>'; return; }
  box.innerHTML=manut.map((e,i)=>({e,i})).sort((a,b)=>(a.e.date||"")<(b.e.date||"")?1:-1).map(({e,i})=>`
    <div class="item">
      <div class="top">
        <span class="desc">${esc(e.desc)}</span>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="dt">${dmy(e.date)}</span>
          <button class="ed" title="Modifica" onclick="editM(${i})">✎</button>
          <button class="x" title="Elimina" onclick="delManut(${i})">✕</button>
        </span>
      </div>
      <div class="meta">
        <span><b>${eur(e.prezzo)}</b></span>
        ${e.km!=null?`<span>${fmt(e.km,0," km")}</span>`:""}
      </div>
    </div>`).join("");
}

// ---- Problemi ----
function addProb(){
  const desc=document.getElementById("p-desc").value.trim();
  const note=document.getElementById("p-note").value.trim();
  if(!desc){ alert("Inserisci una descrizione."); return; }
  if(editProb!=null){ problemi[editProb]={...problemi[editProb],desc,note}; }  // mantiene done/data
  else { problemi.push({desc,note,done:false,date:todayLocal()}); }
  lsSave("prob_v1",problemi); cancelP(); renderAll();
}
function editP(i){
  const e=problemi[i];
  document.getElementById("p-desc").value=e.desc||"";
  document.getElementById("p-note").value=e.note||"";
  editProb=i; editMode("p-save","p-cancel",true); showSec("prob");
}
function cancelP(){
  editProb=null; editMode("p-save","p-cancel",false);
  document.getElementById("p-desc").value=""; document.getElementById("p-note").value="";
}
function toggleProb(i){ problemi[i].done=!problemi[i].done; lsSave("prob_v1",problemi); renderAll(); }
function delProb(i){ if(confirm("Eliminare questo problema?")){ problemi.splice(i,1); lsSave("prob_v1",problemi); renderAll(); } }
function renderProb(){
  const open=problemi.filter(p=>!p.done).length;
  document.getElementById("p-open").textContent=open+" / "+problemi.length;
  const box=document.getElementById("p-list");
  if(!problemi.length){ box.innerHTML='<div class="empty">Nessun problema.</div>'; return; }
  box.innerHTML=problemi.map((e,i)=>({e,i})).sort((a,b)=>(a.e.done?1:0)-(b.e.done?1:0)).map(({e,i})=>`
    <div class="item ${e.done?'done':''}">
      <div class="top" style="align-items:center">
        <span class="desc">${esc(e.desc)}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <button class="chk" title="Segna risolto" onclick="toggleProb(${i})">${e.done?'✓':'○'}</button>
          <button class="ed" title="Modifica" onclick="editP(${i})">✎</button>
          <button class="x" title="Elimina" onclick="delProb(${i})">✕</button>
        </span>
      </div>
      ${e.note?`<div class="note">${esc(e.note)}</div>`:""}
    </div>`).join("");
}

// ---- Ricambi ----
function addRic(){
  const nome=document.getElementById("r-nome").value.trim();
  if(!nome){ alert("Inserisci il nome del pezzo."); return; }
  const rec={nome,prezzo:num(document.getElementById("r-prz").value),note:document.getElementById("r-note").value.trim()};
  if(editRic!=null){ ricambi[editRic]=rec; } else { ricambi.push(rec); }
  lsSave("ric_v1",ricambi); cancelR(); renderAll();
}
function editR(i){
  const e=ricambi[i];
  document.getElementById("r-nome").value=e.nome||"";
  document.getElementById("r-prz").value=e.prezzo??"";
  document.getElementById("r-note").value=e.note||"";
  editRic=i; editMode("r-save","r-cancel",true); showSec("ric");
}
function cancelR(){
  editRic=null; editMode("r-save","r-cancel",false);
  ["r-nome","r-prz","r-note"].forEach(id=>document.getElementById(id).value="");
}
function delRic(i){ if(confirm("Eliminare questo pezzo?")){ ricambi.splice(i,1); lsSave("ric_v1",ricambi); renderAll(); } }
function renderRic(){
  document.getElementById("r-tot").textContent=eur(ricambi.reduce((s,e)=>s+(e.prezzo||0),0));
  const box=document.getElementById("r-list");
  if(!ricambi.length){ box.innerHTML='<div class="empty">Nessun pezzo.</div>'; return; }
  box.innerHTML=ricambi.map((e,i)=>`
    <div class="item">
      <div class="top">
        <span class="desc">${esc(e.nome)}</span>
        <span style="display:flex;align-items:center;gap:8px">
          <span class="dt">${e.prezzo!=null?eur(e.prezzo):"—"}</span>
          <button class="ed" title="Modifica" onclick="editR(${i})">✎</button>
          <button class="x" title="Elimina" onclick="delRic(${i})">✕</button>
        </span>
      </div>
      ${e.note?`<div class="note">${esc(e.note)}</div>`:""}
    </div>`).join("");
}

// ---- Spese (riepilogo di tutto) ----
function renderSpese(){
  const benz=data.reduce((s,e)=>s+(e.importo||0),0);
  const man=manut.reduce((s,e)=>s+(e.prezzo||0),0);
  const ric=ricambi.reduce((s,e)=>s+(e.prezzo||0),0);
  document.getElementById("spese").innerHTML=`
    ${cell("Benzina",eur(benz))}
    ${cell("Manutenzione",eur(man))}
    ${cell("Ricambi",eur(ric))}
    ${cell("TOTALE",eur(benz+man+ric),"","full")}
  `;
}

function renderAll(){ render(); renderManut(); renderProb(); renderRic(); renderSpese(); }

function showSec(t){
  for(const v of ["benzina","manut","prob","ric","spese"]){
    document.getElementById("sec-"+v).hidden=(v!==t);
    document.getElementById("nav-"+v).classList.toggle("on",v===t);
  }
  window.scrollTo(0,0);
}

// init (data parte vuota: si compila solo se la ricordi, o col tasto Oggi)
renderAll();
